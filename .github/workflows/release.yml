name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Publish to CurseForge, Modrinth, Discord & GitHub
        # :neoforge:publishMods MUST run last. Its discord block calls
        # setPlatformsAllFrom(project(':fabric'), project(':neoforge')) so the
        # Discord embed can attach the fabric upload URLs, which only exist once
        # :fabric:publishMods has finished. The plugin's own github { } block
        # creates the GitHub release (no softprops/action-gh-release), and the
        # discord { } block now lives only in :neoforge so there is exactly one
        # combined announcement + banner message pair per release.
        run: ./gradlew :fabric:publishMods :neoforge:publishMods
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_ALPHA_WEBHOOK_URL: ${{ secrets.DISCORD_ALPHA_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

name: Release

on:
  push:
    tags:
      - '*.*.*-*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Extract Changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(grep -E '^(modVersion|version|mod_version)=' gradle.properties | head -1 | cut -d= -f2 | tr -d '[:space:]')
          BODY=$(awk -v ver="$VERSION" '
            $0 ~ "^## [[]?" ver "($|[^-])" { capture=1; next }
            /^## / && capture { exit }
            capture { print }
          ' CHANGELOG.md)
          printf "body<<DELIMITER\n%s\nDELIMITER\n" "$BODY" >> "$GITHUB_OUTPUT"

      - name: Read alphaBuild flag
        id: alpha
        shell: bash
        run: |
          IS_ALPHA=$(grep -E '^alphaBuild=' gradle.properties | cut -d= -f2 | tr -d ' \r\n' || true)
          echo "is_alpha=${IS_ALPHA:-false}" >> "$GITHUB_OUTPUT"

      - name: Check if already published
        id: check_release
        shell: bash
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
        run: |
          VERSION=$(grep -E '^(version|mod_version)=' gradle.properties | head -1 | cut -d= -f2 | tr -d ' \r\n')
          RESULT=$(curl -s \
            -H "Authorization: ${MODRINTH_API_KEY}" \
            -H "User-Agent: FinnSetchell/MoogsStructureLib" \
            "https://api.modrinth.com/v2/project/1oUDhxuy/version")
          MC_VER=$(grep -E '^minecraft_version=' gradle.properties | cut -d= -f2 | tr -d ' \r\n')
          EXISTS=$(echo "$RESULT" | jq --arg ver "$VERSION" --arg mc "$MC_VER" '[.[] | select(.version_number == $ver and .version_type == "release" and (.game_versions | map(. == $mc) | any))] | length')
          if [ "${EXISTS:-0}" -gt "0" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already on Modrinth â€” skipping upload"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} not on Modrinth yet â€” proceeding"
          fi

      - name: Publish to CurseForge, Modrinth & Discord
        if: steps.check_release.outputs.already_published != 'true'
        # :neoforge:publishMods MUST run last. Its discord block calls
        # setPlatformsAllFrom(project(':fabric'), project(':forge'), project(':neoforge'))
        # so the Discord embed can attach the fabric and forge upload URLs, which
        # only exist once those tasks have finished.
        run: ./gradlew :fabric:publishMods :forge:publishMods :neoforge:publishMods
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_ALPHA_WEBHOOK_URL: ${{ secrets.DISCORD_ALPHA_WEBHOOK_URL }}

      - name: Build release title and body
        id: release_meta
        shell: bash
        env:
          IS_ALPHA: ${{ steps.alpha.outputs.is_alpha }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          if [ "$IS_ALPHA" = "true" ]; then
            TITLE="${GITHUB_REF_NAME} (Alpha)"
            BANNER="> ðŸ§ª **Alpha test build.** Feedback welcome at https://github.com/${GITHUB_REPOSITORY}/issues."
            BODY=$(printf "%s\n\n%s" "$BANNER" "$CHANGELOG_BODY")
          else
            TITLE="${GITHUB_REF_NAME}"
            BODY="$CHANGELOG_BODY"
          fi
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          printf "body<<DELIMITER\n%s\nDELIMITER\n" "$BODY" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.title }}
          body: ${{ steps.release_meta.outputs.body }}
          prerelease: ${{ steps.alpha.outputs.is_alpha == 'true' }}
          files: |
            fabric/build/libs/*.jar
            !fabric/build/libs/*-sources.jar
            !fabric/build/libs/*-dev.jar
            neoforge/build/libs/*.jar
            !neoforge/build/libs/*-sources.jar
            forge/build/libs/*.jar
            !forge/build/libs/*-sources.jar
            !forge/build/libs/*-slim.jar
          fail_on_unmatched_files: false

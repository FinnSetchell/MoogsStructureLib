name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Extract Changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(python3 -c "
          import re, sys
          content = open('CHANGELOG.md').read()
          m = re.search(r'## \[' + re.escape(sys.argv[1]) + r'\] - \d{4}-\d{2}-\d{2}\n(.*?)(?=\n---|## \[|\Z)', content, re.DOTALL)
          print(m.group(1).strip() if m else '')
          " "$VERSION")
          printf "body<<DELIMITER\n%s\nDELIMITER\n" "$BODY" >> "$GITHUB_OUTPUT"

      - name: Publish to CurseForge, Modrinth & Discord
        run: ./gradlew :fabric:publishMods :neoforge:publishMods :forge:publishMods
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            fabric/build/libs/*.jar
            !fabric/build/libs/*-sources.jar
            !fabric/build/libs/*-dev.jar
            neoforge/build/libs/*.jar
            !neoforge/build/libs/*-sources.jar
            forge/build/libs/*.jar
            !forge/build/libs/*-sources.jar
            !forge/build/libs/*-slim.jar
          fail_on_unmatched_files: false

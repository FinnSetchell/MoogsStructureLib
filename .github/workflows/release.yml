name: Release

on:
  push:
    tags:
      - '*.*.*-*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Extract Changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(grep -E '^(modVersion|version|mod_version)=' gradle.properties | head -1 | cut -d= -f2 | tr -d '[:space:]')
          BODY=$(awk -v ver="$VERSION" '
            $0 ~ "^## [[]?" ver "($|[^-])" { capture=1; next }
            /^## / && capture { exit }
            capture { print }
          ' CHANGELOG.md)
          printf "body<<DELIMITER\n%s\nDELIMITER\n" "$BODY" >> "$GITHUB_OUTPUT"

      - name: Read alphaBuild flag
        id: alpha
        shell: bash
        run: |
          IS_ALPHA=$(grep -E '^alphaBuild=' gradle.properties | cut -d= -f2 | tr -d ' \r\n' || true)
          echo "is_alpha=${IS_ALPHA:-false}" >> "$GITHUB_OUTPUT"

      - name: Publish to CurseForge, Modrinth & Discord
        # :forge:publishMods MUST run last. Its discord block calls
        # setPlatformsAllFrom(project(':fabric'), project(':forge')) so the
        # Discord embed can attach the fabric upload URLs, which only exist
        # once :fabric:publishMods has finished.
        run: ./gradlew :fabric:publishMods :forge:publishMods
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_ALPHA_WEBHOOK_URL: ${{ secrets.DISCORD_ALPHA_WEBHOOK_URL }}

      - name: Build release title and body
        id: release_meta
        shell: bash
        env:
          IS_ALPHA: ${{ steps.alpha.outputs.is_alpha }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          if [ "$IS_ALPHA" = "true" ]; then
            TITLE="${GITHUB_REF_NAME} (Alpha)"
            BANNER="> 🧪 **Alpha test build.** Feedback welcome at https://github.com/${GITHUB_REPOSITORY}/issues."
            BODY=$(printf "%s\n\n%s" "$BANNER" "$CHANGELOG_BODY")
          else
            TITLE="${GITHUB_REF_NAME}"
            BODY="$CHANGELOG_BODY"
          fi
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          printf "body<<DELIMITER\n%s\nDELIMITER\n" "$BODY" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.title }}
          body: ${{ steps.release_meta.outputs.body }}
          prerelease: ${{ steps.alpha.outputs.is_alpha == 'true' }}
          files: |
            fabric/build/libs/*.jar
            !fabric/build/libs/*-sources.jar
            !fabric/build/libs/*-dev.jar
            !fabric/build/libs/*-dev-shadow.jar
            forge/build/libs/*.jar
            !forge/build/libs/*-sources.jar
            !forge/build/libs/*-dev.jar
            !forge/build/libs/*-dev-shadow.jar
          fail_on_unmatched_files: false

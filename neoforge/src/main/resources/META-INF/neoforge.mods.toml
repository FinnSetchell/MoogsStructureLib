modLoader="javafml"
loaderVersion="[2,)"
issueTrackerURL="https://github.com/FinnSetchell/MoogsStructureLib/issues" #optional
license="https://github.com/FinnSetchell/MoogsStructureLib/blob/main/LICENSE"

[[mods]]
    modId="moogs_structures"
    logoFile= "assets/moogs_structures/icon.png"
    logoBlur=false
    version="${version}"
    displayName="Moog's Structure Lib"
    displayURL="https://github.com/FinnSetchell/MoogsStructureLib"
    authors="FinnDog"
    credits="Thanks to TelepathicGrunt for their structure mod template and rs"
    description='''
    Moog's Structure Lib is a library mod used to generate the structures from the
    Moog's Voyager Structures mod. This mod provides the core functionality for
    structure generation and is required by Moog's Voyager Structures.
    '''

[[mixins]]
    config = "moogs_structures-neoforge.mixins.json"

[[mixins]]
    config = "moogs_structures-common.mixins.json"

[[dependencies.moogs_structures]]
    modId="minecraft"
    type="required"
    versionRange="[1.20.5,)"
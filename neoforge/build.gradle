plugins {
    id 'multiloader-loader'
    id 'net.neoforged.moddev'
    id 'me.modmuss50.mod-publish-plugin'
}

sourceSets {
    gameTest {
        compileClasspath += sourceSets.main.compileClasspath + sourceSets.main.output
        runtimeClasspath += sourceSets.main.runtimeClasspath + sourceSets.main.output
    }
}

neoForge {
    version = neo_version
    // Automatically enable AccessTransformers if the file exists
    def at = project(':common').file('src/main/resources/META-INF/accesstransformer.cfg')
    if (at.exists()) {
        accessTransformers.from(at.absolutePath)
    }
    runs {
        configureEach {
            systemProperty('neoforge.enabledGameTestNamespaces', mod_id)
            ideName = "NeoForge ${it.name.capitalize()} (${project.path})"
        }
        client {
            client()
            gameDirectory = this.mkdir(this.file("runs/client"))
        }
        data {
            clientData()
            gameDirectory = this.mkdir(this.file("runs/data"))
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
        server {
            server()
            this.file("runs/server").createParentDirectories()
            gameDirectory = this.mkdir(this.file("runs/server"))
        }
        gameTestServer {
            type = "gameTestServer"
            gameDirectory = this.mkdir(this.file("runs/gameTestServer"))
        }
    }
    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
            sourceSet sourceSets.gameTest
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

// Implement mcgradleconventions loader attribute
def loaderAttribute = Attribute.of('io.github.mcgradleconventions.loader', String)
['apiElements', 'runtimeElements', 'sourcesElements', 'javadocElements'].each { variant ->
    configurations.named("$variant") {
        attributes {
            attribute(loaderAttribute, 'neoforge')
        }
    }
}
sourceSets.configureEach {
    [it.compileClasspathConfigurationName, it.runtimeClasspathConfigurationName, it.getTaskName(null, 'jarJar')].each { variant ->
        configurations.named("$variant") {
            attributes {
                attribute(loaderAttribute, 'neoforge')
            }
        }
    }
}

File changeLog = rootProject.file("CHANGELOG.md")
String changelogtext = ""
if (changeLog.exists()) {
    def sections = changeLog.text.split(/(?m)^## /)
    changelogtext = sections.length > 1 ? "## " + sections[1].trim() : changeLog.text
}

def isAlpha = project.findProperty('alphaBuild')?.toString()?.toBoolean() ?: false
def discordWebhookEnvVar = isAlpha ? 'DISCORD_ALPHA_WEBHOOK_URL' : 'DISCORD_WEBHOOK'
// Discord role ping control. alphaBuild=true forces no ping (alpha test
// builds never mention subscribers); otherwise the discordPing property in
// gradle.properties decides (defaults to true if unset).
def rawDiscordPing = project.findProperty('discordPing')
def discordPingExplicit = rawDiscordPing != null ? rawDiscordPing.toString().toBoolean() : true
def discordPing = isAlpha ? false : discordPingExplicit

publishMods {
    file = tasks.jar.archiveFile
    changelog = changelogtext
    type = isAlpha ? ALPHA : STABLE
    modLoaders.add("neoforge")

    displayName = "Moog's Structure Lib ${project.version} [NEOFORGE]"

    maxRetries = 3
    dryRun = false

    // No github { } block here on purpose: fabric/build.gradle owns the unified
    // GitHub release and attaches this jar via additionalFiles. Two github
    // blocks on the same tag race each other and the second one 422s on
    // already_exists.

    modrinth {
        accessToken = providers.environmentVariable("MODRINTH_API_KEY")
        projectId = "1oUDhxuy"
        minecraftVersions.addAll("26.2")
    }

    curseforge {
        accessToken = providers.environmentVariable("CURSEFORGE_API_KEY")
        projectId = "1337167"
        projectSlug = "moogs-structure-lib"
        serverRequired = true
        minecraftVersions.addAll("26.2")
    }

    discord {
        webhookUrl = providers.environmentVariable(discordWebhookEnvVar)
        dryRunWebhookUrl = providers.environmentVariable('DISCORD_WEBHOOK_DRY_RUN').orElse('')
        username = "Moog's Mods"
        avatarUrl = (rootProject.findProperty('discord_avatar_url') ?: '')

        // Alpha mode: attach one embed button per uploaded jar (fabric/neoforge
        // x CurseForge/Modrinth = 4 embeds) so testers click straight through to
        // the specific alpha file. We deliberately enumerate the CurseForge +
        // Modrinth platforms explicitly rather than using setPlatformsAllFrom(),
        // because both fabric and neoforge also have github { } blocks and they
        // resolve to the same release URL — Discord rejects duplicate embed URLs
        // and the announceDiscord task fails. Listing only CF + Modrinth gives
        // us 4 distinct embed URLs (one per loader x platform).
        //
        // Stable mode: no auto-attached embeds. The curated CurseForge files and
        // Modrinth versions links inside the content block are the only download
        // entry points.
        if (isAlpha) {
            setPlatforms(
                project(':fabric').publishMods.platforms.curseforge,
                project(':fabric').publishMods.platforms.modrinth,
                project(':neoforge').publishMods.platforms.curseforge,
                project(':neoforge').publishMods.platforms.modrinth,
            )
        }

        content = changelog.map { text ->
            def changelogBody = text.replaceFirst(/(?i)^#\s*Changelog\s*\n?/, '')
                    .replaceFirst(/^\d+\.\d+\.\d+\s*\n?/, '')
                    .trim()

            def modName = rootProject.findProperty('mod_name') ?: 'Moogs Structure Lib'
            def mcVersion = rootProject.findProperty('minecraft_version') ?: '26.2'
            def header = isAlpha
                ? "## 🧪 **${modName} ${project.version}** alpha build is up for testing!"
                : "## 🎉 **${modName} ${project.version}** has been released!"
            def body = """${header}

**${modName} ${project.version}-${mcVersion}**
Versions: ${mcVersion} | Fabric, NeoForge

### 📝 **Changelog:**
${changelogBody}"""
            // Stable mode appends curated CurseForge files + Modrinth versions links
            // under the message body. Alpha mode relies on the per-platform embed
            // links auto-attached above, so no curated link line is appended.
            isAlpha ? body : body + "\n\n<:curseforge:1132291568305459250> [CurseForge](https://www.curseforge.com/minecraft/mc-mods/moogs-structure-lib/files) | <:modrinth:1132291566019563550> [Modrinth](https://modrinth.com/mod/moogs-structure-lib/versions)"
        }

        style {
            look = "MODERN"
            link = "EMBED"
            color = (rootProject.findProperty('discordEmbedColor') ?: '#9033af')
        }
    }
}

tasks.named('announceDiscord').configure {
    doFirst {
        def webhookUrl = System.getenv(discordWebhookEnvVar)
        def bannerUrl = project.findProperty('discord_banner_url') as String
        def avatarUrl = project.findProperty('discord_avatar_url') as String
        def roleId = project.findProperty('discord_role_id') as String
        if (!bannerUrl) return
        if (!webhookUrl) {
            logger.warn("Discord banner skipped: ${discordWebhookEnvVar} is not set")
            return
        }
        def connection = new URL(webhookUrl).openConnection()
        connection.requestMethod = 'POST'
        connection.doOutput = true
        connection.setRequestProperty('Content-Type', 'application/json')
        def bannerContent = discordPing ? "<@&${roleId}>\\n${bannerUrl}" : bannerUrl
        def allowedRoles = discordPing ? "\"${roleId}\"" : ''
        connection.outputStream.withWriter { it << """{"username":"Moog's Mods","avatar_url":"${avatarUrl}","content":"${bannerContent}","allowed_mentions":{"parse":[],"roles":[${allowedRoles}]}}""" }
        connection.responseCode
    }
}

plugins {
    id "com.github.johnrengelman.shadow" version "7.1.2"
    id "me.modmuss50.mod-publish-plugin" version "0.8.4"
}

architectury {
    platformSetupLoomIde()
    neoForge()
}

// MC range goes in archivesBaseName so the jar filename keeps it; the version field
// (consumed by neoforge.mods.toml) stays plain SemVer "3.0.0" - see root build.gradle.
// When alphaBuild=true the filename also picks up an -alpha suffix so testers can
// spot the difference at a glance.
def isAlphaBuild = project.findProperty('alphaBuild')?.toString()?.toBoolean() ?: false
archivesBaseName = "${rootProject.archives_base_name}-${rootProject.minecraft_version_range}" + (isAlphaBuild ? '-alpha' : '')

configurations {
    common
    shadowCommon // Don't use shadow from the shadow plugin because we don't want IDEA to index this.
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentNeoForge.extendsFrom common
}

dependencies {
    neoForge "net.neoforged:neoforge:${rootProject.neoforge_version}"

    common(project(path: ":common", configuration: "namedElements")) { transitive false }
    shadowCommon(project(path: ":common", configuration: "transformProductionNeoForge")) { transitive = false }
}

processResources {
    inputs.property "version", project.version

    filesMatching("META-INF/neoforge.mods.toml") {
        expand "version": project.version
    }
}

shadowJar {
    exclude "fabric.mod.json"
    exclude "architectury.common.json"

    configurations = [project.configurations.shadowCommon]
    archiveClassifier.set("dev-shadow")
}

remapJar {
    inputFile.set shadowJar.archiveFile
    dependsOn shadowJar
    archiveClassifier.set("neoforge")
    atAccessWideners.add("moogs_structures.accesswidener") // this is a path inside the mod jar
}

jar {
    archiveClassifier.set("dev")
}

sourcesJar {
    def commonSources = project(":common").sourcesJar
    dependsOn commonSources
    from commonSources.archiveFile.map { zipTree(it) }
}

components.java {
    withVariantsFromConfiguration(project.configurations.shadowRuntimeElements) {
        skip()
    }
}

File changeLog = rootProject.file("CHANGELOG.md")
String changelogtext = changeLog.exists() ? changeLog.text : ""

def isAlpha = project.findProperty('alphaBuild')?.toString()?.toBoolean() ?: false

publishMods {
    file = remapJar.archiveFile
    type = isAlpha ? ALPHA : STABLE
    modLoaders.add("neoforge")
    changelog = changelogtext

    displayName = "Moog's Structure Lib ${project.version} [NEOFORGE]"

    modrinth {
        accessToken = providers.environmentVariable("MODRINTH_API_KEY")
        projectId = "1oUDhxuy"
        minecraftVersionRange {
            start = "1.20.5"
            end = "1.20.6"
        }
    }

    curseforge {
        accessToken = providers.environmentVariable("CURSEFORGE_API_KEY")
        projectId = "1337167"
        serverRequired = true
        minecraftVersionRange {
            start = "1.20.5"
            end = "1.20.6"
        }
    }

}
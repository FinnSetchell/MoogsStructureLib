plugins {
    id 'multiloader-loader'
    id 'net.fabricmc.fabric-loom'
    id 'me.modmuss50.mod-publish-plugin'
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${fabric_loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"
}

loom {
    def aw = project(':common').file("src/main/resources/${mod_id}.accesswidener")
    if (aw.exists()) {
        accessWidenerPath.set(aw)
    }
    runs {
        client {
            client()
            setConfigName('Fabric Client')
            ideConfigGenerated(true)
            runDir('runs/client')
        }
        server {
            server()
            setConfigName('Fabric Server')
            ideConfigGenerated(true)
            runDir('runs/server')
        }
    }
}

// Implement mcgradleconventions loader attribute
def loaderAttribute = Attribute.of('io.github.mcgradleconventions.loader', String)
['apiElements', 'runtimeElements', 'sourcesElements', 'javadocElements', 'includeInternal', 'modCompileClasspath'].each { variant ->
    configurations.named("$variant") {
        attributes {
            attribute(loaderAttribute, 'fabric')
        }
    }
}
sourceSets.configureEach {
    [it.compileClasspathConfigurationName, it.runtimeClasspathConfigurationName].each { variant ->
        configurations.named("$variant") {
            attributes {
                attribute(loaderAttribute, 'fabric')
            }
        }
    }
}

File changeLog = rootProject.file("CHANGELOG.md")
String changelogtext = ""
if (changeLog.exists()) {
    def sections = changeLog.text.split(/(?m)^## /)
    changelogtext = sections.length > 1 ? "## " + sections[1].trim() : changeLog.text
}

publishMods {
    file = tasks.jar.archiveFile
    type = STABLE
    modLoaders.add("fabric")
    changelog = changelogtext

    displayName = "Moog's Structure Lib ${project.version} [FABRIC]"

    github {
        accessToken = providers.environmentVariable("GITHUB_TOKEN")
        repository = "FinnSetchell/MoogsStructureLib"
        commitish = "26.1.x"
        tagName = providers.environmentVariable("GITHUB_REF_NAME").orElse("v${project.version}")
        displayName = "Moog's Structure Lib ${project.version} [FABRIC]"
    }

    modrinth {
        accessToken = providers.environmentVariable("MODRINTH_API_KEY")
        projectId = "1oUDhxuy"
        minecraftVersions.addAll("26.1.0", "26.1.1", "26.1.2")
    }

    curseforge {
        accessToken = providers.environmentVariable("CURSEFORGE_API_KEY")
        projectId = "1337167"
        projectSlug = "moogs-structure-lib"
        serverRequired = true
        minecraftVersions.addAll("26.1.0", "26.1.1", "26.1.2")
    }

    discord {
        webhookUrl = providers.environmentVariable('DISCORD_WEBHOOK')
        dryRunWebhookUrl = providers.environmentVariable('DISCORD_WEBHOOK_DRY_RUN').orElse('')
        username = "Moog's Mods"

        content = changelog.map { text ->
            def changelogBody = text.replaceFirst(/(?i)^#\s*Changelog\s*\n?/, '')
                    .replaceFirst(/^\d+\.\d+\.\d+\s*\n?/, '')
                    .trim()

            def modName = rootProject.findProperty('mod_name') ?: 'Moogs Structure Lib'
            def mcVersion = rootProject.findProperty('minecraft_version') ?: '1.21.11'

            """## 🎉 **${modName} ${project.version}** has been released!

**Moog's Structure Lib ${project.version} [FABRIC]**
Minecraft Version - ${mcVersion}

### 📝 **Changelog:**
${changelogBody}
"""
        }

        style {
            look = "MODERN"
            link = "EMBED"
            color = (rootProject.findProperty('discordEmbedColor') ?: '#9033af')
        }
    }
}
